<!DOCTYPE html>
<html>


<head>

<title>HTML Dropdown</title>

</head>


<body>


<h2> Dropdown</h2>


<form>


<!-- Simple Country Dropdown -->

<label>Country:</label>


<select>


<option>
Pakistan
</option>


<option>
India
</option>


<option>
China
</option>


</select>


<br><br>



<!-- City Dropdown -->


<label>City:</label>


<select>


<option>
Multan
</option>


<option>
Lahore
</option>


<option>
Karachi
</option>


</select>


<br><br>




<!-- Programming Languages Dropdown -->


<label>Programming Language:</label>


<select>


<option>
HTML
</option>


<option>
CSS
</option>


<option>
JavaScript
</option>


</select>


<br><br>





<!-- Dropdown with Option Group -->


<label>Subjects:</label>


<select>


<optgroup label="Web Development">


<option>
HTML
</option>


<option>
CSS
</option>


<option>
JavaScript
</option>


</optgroup>



<optgroup label="Programming">


<option>
C++
</option>


<option>
Python
</option>


</optgroup>


</select>


<br><br>



<button>
Submit
</button>



</form>


</body>


</html>
