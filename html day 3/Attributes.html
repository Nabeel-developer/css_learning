<!DOCTYPE html>
<html>

<head>
<title>Input Attributes</title>
</head>


<body>


<h2>Section 4: Input Attributes</h2>


<form>


<!-- Placeholder attribute -->
<label>Name:</label>
<input type="text" placeholder="Enter Name">


<br><br>


<!-- Required attribute -->
<label>Email:</label>
<input type="email" required>


<br><br>


<!-- Readonly attribute -->
<label>ID:</label>
<input type="text" value="12345" readonly>


<br><br>


<!-- Disabled attribute -->
<label>Country:</label>
<input type="text" value="Pakistan" disabled>


<br><br>


<!-- Value attribute -->
<label>Username:</label>
<input type="text" value="Hafiz Muhammad Nabeel">


<br><br>


<!-- Name attribute -->
<input type="text" name="studentName">


<br><br>


<!-- ID attribute -->
<input type="text" id="box1">


<br><br>


<!-- Min and Max -->
<label>Age:</label>

<input type="number" min="10" max="50">


<br><br>


<!-- Maxlength -->
<label>Password:</label>

<input type="text" maxlength="8">


<br><br>


<!-- Minlength -->
<label>Username:</label>

<input type="text" minlength="3">


<br><br>


<!-- Checked -->
<label>Remember Me:</label>

<input type="checkbox" checked>


<br><br>


<!-- Multiple File Upload -->
<label>Select Files:</label>

<input type="file" multiple>


<br><br>


<!-- Accept only image files -->
<label>Upload Image:</label>

<input type="file" accept=".jpg,.png">


<br><br>


<!-- Step -->
<label>Number:</label>

<input type="number" step="5">


<br><br>


<button>
Submit
</button>


</form>


</body>

</html>
