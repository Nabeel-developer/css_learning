<!DOCTYPE html>
<html>
<head>
    <title>Semantic HTML</title>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>My Website</h1>
    </header>

    <hr>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Contact</a>
    </nav>

    <hr>

    <!-- Main Content -->
    <main>

        <!-- Section 1 -->
        <section>
            <h2>Section One</h2>
            <p>This is the first section.</p>
        </section>

        <!-- Section 2 -->
        <section>
            <h2>Section Two</h2>
            <p>This is the second section.</p>
        </section>

        <!-- Article -->
        <article>
            <h2>Article Title</h2>
            <p>This is an article.</p>
        </article>

        <!-- Sidebar -->
        <aside>
            <h3>Sidebar</h3>
            <p>Useful links and information.</p>
        </aside>

    </main>

    <hr>

    <!-- Footer -->
    <footer>
        <p>© 2025 My Website</p>
    </footer>

</body>
</html>
