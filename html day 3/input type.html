<!DOCTYPE html>
<html>

<head>
    <title>HTML Input Types</title>
</head>


<body>


<h2> HTML Input Types</h2>


<form>


<!-- Normal Text Input -->
<label>Name:</label>
<input type="text" placeholder="Enter your name">

<br><br>


<!-- Password Input -->
<label>Password:</label>
<input type="password" placeholder="Enter password">

<br><br>


<!-- Email Input -->
<label>Email:</label>
<input type="email" placeholder="Enter email">

<br><br>


<!-- Number Input -->
<label>Age:</label>
<input type="number">

<br><br>


<!-- Telephone Input -->
<label>Phone:</label>
<input type="tel">

<br><br>


<!-- URL Input -->
<label>Website:</label>
<input type="url">

<br><br>


<!-- Date Input -->
<label>Date:</label>
<input type="date">

<br><br>


<!-- Time Input -->
<label>Time:</label>
<input type="time">

<br><br>


<!-- Month Input -->
<label>Month:</label>
<input type="month">

<br><br>


<!-- Week Input -->
<label>Week:</label>
<input type="week">

<br><br>


<!-- Color Picker -->
<label>Choose Color:</label>
<input type="color">

<br><br>


<!-- Range Slider -->
<label>Volume:</label>
<input type="range">

<br><br>


<!-- File Upload -->
<label>Upload File:</label>
<input type="file">

<br><br>


<!-- Search Box -->
<label>Search:</label>
<input type="search">

<br><br>


<!-- Radio Button -->
<label>Gender:</label>

<input type="radio" name="gender">
Male

<input type="radio" name="gender">
Female

<br><br>


<!-- Checkbox -->
<label>Skills:</label>

<input type="checkbox">
HTML

<input type="checkbox">
CSS


<br><br>


<!-- Hidden Input -->
<input type="hidden">


<!-- Submit Button -->
<input type="submit">


<!-- Reset Button -->
<input type="reset">


</form>


</body>

</html>
