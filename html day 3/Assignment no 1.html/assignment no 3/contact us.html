<!DOCTYPE html>
<html>
<head>
    <title>Contact Us</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
        }

        header{
            background:#333;
            color:white;
            padding:20px;
            text-align:center;
        }

        nav{
            background:#555;
            padding:10px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:15px;
        }

        section{
            padding:20px;
        }

        form{
            width:50%;
            margin:auto;
        }

        input, textarea{
            width:100%;
            padding:10px;
            margin:8px 0;
        }

        button{
            padding:10px 20px;
        }

        footer{
            background:#333;
            color:white;
            text-align:center;
            padding:15px;
            margin-top:20px;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Contact Us</h1>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
    </nav>

    <!-- Contact Form -->
    <section>
        <h2>Send Us a Message</h2>

        <form>
            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required>

            <label>Message:</label>
            <textarea rows="5" placeholder="Enter your message"></textarea>

            <button type="submit">Send</button>
        </form>
    </section>

    <!-- Google Map -->
    <section>
        <h2>Our Location</h2>

        <iframe
            src="https://maps.google.com/maps?q=multan&t=&z=13&ie=UTF8&iwloc=&output=embed"
            width="100%"
            height="300"
            style="border:0;">
        </iframe>
    </section>

    <!-- Footer -->
    <footer>
        <p>&copy; 2025 Nexabizsol software company lahore All Rights Reserved.</p>
    </footer>

</body>
</html>
