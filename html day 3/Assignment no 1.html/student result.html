<!DOCTYPE html>
<html>
<head>
    <title>Student Result Table</title>
    <style>
        table{
            width:80%;
            margin:auto;
            border-collapse:collapse;
            text-align:center;
        }
        table, th, td{
            border:1px solid black;
            padding:10px;
        }
        caption{
            font-size:24px;
            font-weight:bold;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<table>
    <caption>Student Result Table</caption>

    <thead>
        <tr>
            <th rowspan="2">Roll No</th>
            <th rowspan="2">Name</th>
            <th colspan="4">Subjects</th>
            <th rowspan="2">Total</th>
            <th rowspan="2">Grade</th>
        </tr>

        <tr>
            <th>HTML</th>
            <th>CSS</th>
            <th>JS</th>
            <th>Python</th>
        </tr>
    </thead>

    <tbody>
        <tr>
            <td>101</td>
            <td>Ahmad</td>
            <td>85</td>
            <td>90</td>
            <td>88</td>
            <td>92</td>
            <td>355</td>
            <td>A</td>
        </tr>

        <tr>
            <td>102</td>
            <td>Ahmed khan</td>
            <td>75</td>
            <td>80</td>
            <td>78</td>
            <td>85</td>
            <td>318</td>
            <td>B</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Sara ali</td>
            <td>90</td>
            <td>95</td>
            <td>89</td>
            <td>96</td>
            <td>370</td>
            <td>A+</td>
        </tr>
    </tbody>

    <tfoot>
        <tr>
            <td colspan="6">Class Average</td>
            <td>348</td>
            <td>A</td>
        </tr>
    </tfoot>
</table>

</body>
</html>
