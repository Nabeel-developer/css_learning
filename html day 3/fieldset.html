<!DOCTYPE html>
<html lang="en">

<head>
   
    <title> Fieldset & Legend</title>
</head>

<body>

    <h2>Personal Information</h2>

    <form>

        <fieldset>

            <legend>Personal Information</legend>

            <label>Full Name:</label>
            <input type="text" name="fullname">

            <br><br>

            <label>Email:</label>
            <input type="email" name="email">

            <br><br>

            <label>Phone:</label>
            <input type="tel" name="phone">

            <br><br>

            <button type="submit">
                Submit
            </button>

        </fieldset>

    </form>

</body>

</html>
