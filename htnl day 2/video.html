<!DOCTYPE html>
<html lang="en">
<head>
   
    <title>Video </title>
</head>
<body>

    <!-- video -->
    <h2>Section 6: Video</h2>

    <p>Embedded Video Example</p>

    <!-- Video Player -->
    <video width="600" height="350" controls poster="thumbnail.jpg">
        
        <!-- Video Source -->
        <source src="video.mp4" type="video/mp4">

        <!-- Fallback Message -->
        Your browser does not support the video tag.

    </video>

</body>
</html>
