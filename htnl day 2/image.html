<!DOCTYPE html>
<html lang="en">

<head>
  
    <title>Images Practice</title>
</head>

<body>

    <!-- Main Heading -->
    <h1> Images</h1>

    <!-- Company Logo -->
    <h2>Company Logo</h2>
    <img src="images/logo.png"
         alt="Company Logo"
         width="200"
         height="150"
         title="Company Logo">

    <br><br>

    <!-- Office Image -->
    <h2>Office Image</h2>
    <img src="images/office.jpg"
         alt="Office Building"
         width="300"
         height="200"
         title="Our Office">

    <br><br>

    <!-- Team Image -->
    <h2>Team Image</h2>
    <img src="images/team.jpg"
         alt="Team Members"
         width="300"
         height="200"
         title="Our Team">

    <br><br>

    <!-- Laptop Image -->
    <h2>Laptop Image</h2>
    <img src="images/laptop.jpg"
         alt="Laptop"
         width="300"
         height="200"
         title="Laptop Image">

    <br><br>

    <!-- AI Illustration -->
    <h2>AI Illustration</h2>
    <img src="images/ai.jpg"
         alt="Artificial Intelligence Illustration"
         width="100"
         height="150"
         title="AI Illustration">

</body>

</html>
